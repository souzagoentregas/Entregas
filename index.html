<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Entrega | Logística Rápida</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --navy: #0f172a;
      --slate: #475569;
      --light-slate: #94a3b8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --accent: #f59e0b;
      --error: #ef4444;
      --success: #22c55e;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--navy);
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--navy);
      padding: 40px 20px;
      text-align: center;
      color: white;
      border-bottom: 4px solid var(--primary);
    }

    header h1 {
      font-size: 28px;
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    header p {
      color: var(--light-slate);
      margin: 8px 0 0;
      font-size: 16px;
    }

    main {
      max-width: 560px;
      margin: -30px auto 60px;
      padding: 0 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 32px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid #e2e8f0;
    }

    .campo { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--slate);
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    textarea { resize: vertical; min-height: 80px; }

    .check-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 8px;
      cursor: pointer;
    }

    .check-container input { width: 20px; height: 20px; cursor: pointer; }
    .check-container span { font-size: 14px; font-weight: 600; }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }

    button:active { transform: scale(0.98); }

    .btn-calcular { background: var(--primary); color: white; }
    .btn-calcular:hover { background: var(--primary-hover); }
    .btn-calcular:disabled { background: var(--light-slate); cursor: not-allowed; }

    .btn-enviar {
      background: var(--success);
      color: white;
      margin-top: 16px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .feedback {
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      display: none;
    }

    .feedback.error { background: #fee2e2; color: var(--error); border: 1px solid #fecaca; }
    .feedback.success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

    .painel {
      display: none;
      margin-top: 24px;
      background: var(--navy);
      border-radius: var(--radius);
      padding: 24px;
      color: white;
      animation: slideDown 0.4s ease;
    }

    .painel .linha {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .painel .linha:last-child { border-bottom: none; }
    .painel .rotulo { color: var(--light-slate); font-size: 13px; font-weight: 600; }
    .painel .valor { color: var(--accent); font-family: 'Inter', monospace; font-size: 18px; font-weight: 700; }
    .painel .total { margin-top: 12px; padding-top: 12px; border-top: 2px solid rgba(255,255,255,0.2); }
    .painel .total .valor { font-size: 28px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 480px) {
      header { padding: 30px 15px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Solicitar Entrega</h1>
  <p>Cálculo de rota e valor em tempo real</p>
</header>

<main>
  <div class="card">
    <div class="campo">
      <label for="nome">Seu Nome Completo</label>
      <input type="text" id="nome" placeholder="Ex: João Silva" autocomplete="name">
    </div>
    
    <div class="campo">
      <label for="telefone">WhatsApp</label>
      <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15">
    </div>

    <div class="campo">
      <label for="coleta">Endereço de Coleta</label>
      <input type="text" id="coleta" placeholder="Rua, número, bairro e cidade">
      <button type="button" id="btnLocalizacao" style="background:#fff; border:1px solid var(--primary); color:var(--primary); margin-top:8px; padding:9px; font-size:13px; font-weight:600;">📍 Usar minha localização atual</button>
    </div>

    <div class="campo">
      <label for="entrega">Endereço de Entrega</label>
      <input type="text" id="entrega" placeholder="Rua, número, bairro e cidade">
    </div>

    <div class="campo">
      <label for="pacote">O que será transportado?</label>
      <textarea id="pacote" placeholder="Ex: Documentos, Caixa pequena (2kg), etc."></textarea>
    </div>

    <div class="campo">
      <label for="obs">Observações Adicionais (Opcional)</label>
      <textarea id="obs" placeholder="Ex: Falar com Maria na recepção..."></textarea>
    </div>

    <label class="check-container">
      <input type="checkbox" id="retorno">
      <span>Incluir retorno ao ponto de coleta</span>
    </label>

    <button class="btn-calcular" id="btnCalcular">Calcular Valor da Entrega</button>
    
    <div class="feedback error" id="erroMsg"></div>

    <div class="painel" id="painel">
      <div class="linha">
        <span class="rotulo">Distância de Ida</span>
        <span class="valor" id="distKm">-- km</span>
      </div>
      <div class="linha" id="linhaRetorno" style="display:none;">
        <span class="rotulo">Distância de Retorno</span>
        <span class="valor" id="distRetorno">-- km</span>
      </div>
      <div class="linha total">
        <span class="rotulo">Valor Estimado</span>
        <span class="valor" id="valorTotal">R$ 0,00</span>
      </div>
    </div>

    <button class="btn-enviar" id="btnEnviar">Confirmar e Enviar Pedido</button>
    <div class="feedback success" id="sucessoMsg"></div>
  </div>
</main>

<script>
  // Configurações (Nota: Em produção, chaves de API devem ficar no servidor)
  const CONFIG = {
    GH_KEY: '76d351a7-1465-4aad-8c30-b6fdc17eb28b',
    TG_TOKEN: '8909969423:AAGkMM8bHtE5cD2hycD87HSpyL7zXFHoJgY',
    TG_CHAT_ID: '7382480510'
  };

  const DOM = {
    btnCalcular: document.getElementById('btnCalcular'),
    btnEnviar: document.getElementById('btnEnviar'),
    painel: document.getElementById('painel'),
    erroMsg: document.getElementById('erroMsg'),
    sucessoMsg: document.getElementById('sucessoMsg'),
    inputs: ['nome', 'telefone', 'coleta', 'entrega', 'pacote', 'obs', 'retorno'].reduce((acc, id) => {
      acc[id] = document.getElementById(id);
      return acc;
    }, {})
  };

  let ultimoCalculo = null;

  // Máscara simples para telefone
  DOM.inputs.telefone.addEventListener('input', (e) => {
    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
    e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
  });

  async function apiFetch(url, options = {}) {
    try {
      const resp = await fetch(url, options);
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.description || `Erro HTTP: ${resp.status}`);
      return data;
    } catch (e) {
      throw new Error(e.message || 'Falha na conexão com o serviço.');
    }
  }

  async function geocode(address) {
    const data = await apiFetch(`https://graphhopper.com/api/1/geocode?q=${encodeURIComponent(address)}&locale=pt&limit=1&key=${CONFIG.GH_KEY}`);
    if (!data.hits?.length) throw new Error(`Endereço não localizado: ${address}`);
    return data.hits[0].point;
  }

  async function getRoute(p1, p2) {
    const data = await apiFetch(`https://graphhopper.com/api/1/route?point=${p1.lat},${p1.lng}&point=${p2.lat},${p2.lng}&vehicle=car&key=${CONFIG.GH_KEY}`);
    if (!data.paths?.length) throw new Error('Não foi possível traçar uma rota entre os pontos.');
    return data.paths[0].distance / 1000;
  }

  function calcularTarifa(km) {
    if (km <= 5) return 15;
    return 15 + (km - 5) * 3;
  }

  async function geocodeReverso(lat, lng) {
    const data = await apiFetch(`https://graphhopper.com/api/1/geocode?reverse=true&point=${lat},${lng}&locale=pt&key=${CONFIG.GH_KEY}`);
    if (!data.hits?.length) throw new Error('Não foi possível identificar seu endereço atual.');
    const h = data.hits[0];
    const partes = [h.street, h.housenumber, h.city].filter(Boolean);
    return partes.length ? partes.join(', ') : `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }

  const btnLocalizacao = document.getElementById('btnLocalizacao');
  btnLocalizacao.addEventListener('click', () => {
    if (!navigator.geolocation) {
      DOM.erroMsg.textContent = 'Seu navegador não suporta localização automática.';
      DOM.erroMsg.style.display = 'block';
      return;
    }

    btnLocalizacao.disabled = true;
    btnLocalizacao.textContent = 'Localizando...';
    DOM.erroMsg.style.display = 'none';

    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const endereco = await geocodeReverso(pos.coords.latitude, pos.coords.longitude);
        DOM.inputs.coleta.value = endereco;
      } catch (err) {
        DOM.erroMsg.textContent = err.message;
        DOM.erroMsg.style.display = 'block';
      } finally {
        btnLocalizacao.disabled = false;
        btnLocalizacao.textContent = '📍 Usar minha localização atual';
      }
    }, () => {
      DOM.erroMsg.textContent = 'Não foi possível acessar sua localização. Verifique as permissões do navegador.';
      DOM.erroMsg.style.display = 'block';
      btnLocalizacao.disabled = false;
      btnLocalizacao.textContent = '📍 Usar minha localização atual';
    }, { enableHighAccuracy: true, timeout: 10000 });
  });

  DOM.btnCalcular.addEventListener('click', async () => {
    const vals = {};
    let temErro = false;

    ['nome', 'telefone', 'coleta', 'entrega', 'pacote'].forEach(id => {
      const val = DOM.inputs[id].value.trim();
      if (!val) temErro = true;
      vals[id] = val;
    });

    DOM.erroMsg.style.display = 'none';
    DOM.painel.style.display = 'none';
    DOM.btnEnviar.style.display = 'none';

    if (temErro) {
      DOM.erroMsg.textContent = 'Por favor, preencha todos os campos obrigatórios.';
      DOM.erroMsg.style.display = 'block';
      return;
    }

    DOM.btnCalcular.disabled = true;
    DOM.btnCalcular.textContent = 'Calculando rota...';

    try {
      const [ptColeta, ptEntrega] = await Promise.all([
        geocode(vals.coleta),
        geocode(vals.entrega)
      ]);

      const kmIda = await getRoute(ptColeta, ptEntrega);
      const comRetorno = DOM.inputs.retorno.checked;
      const kmTotal = comRetorno ? kmIda * 2 : kmIda;
      const valor = calcularTarifa(kmTotal);

      document.getElementById('distKm').textContent = kmIda.toFixed(1) + ' km';
      if (comRetorno) {
        document.getElementById('linhaRetorno').style.display = 'flex';
        document.getElementById('distRetorno').textContent = kmIda.toFixed(1) + ' km';
      } else {
        document.getElementById('linhaRetorno').style.display = 'none';
      }

      document.getElementById('valorTotal').textContent = 'R$ ' + valor.toFixed(2).replace('.', ',');
      DOM.painel.style.display = 'block';
      DOM.btnEnviar.style.display = 'block';

      ultimoCalculo = { ...vals, obs: DOM.inputs.obs.value, kmIda, comRetorno, valor };

    } catch (err) {
      DOM.erroMsg.textContent = err.message;
      DOM.erroMsg.style.display = 'block';
    } finally {
      DOM.btnCalcular.disabled = false;
      DOM.btnCalcular.textContent = 'Calcular Valor da Entrega';
    }
  });

  DOM.btnEnviar.addEventListener('click', async () => {
    if (!ultimoCalculo) return;

    DOM.btnEnviar.disabled = true;
    DOM.btnEnviar.textContent = 'Enviando pedido...';
    
    const c = ultimoCalculo;
    
    // 1. Limpeza do número para WhatsApp (apenas números + prefixo 55)
    const telLimpo = "55" + c.telefone.replace(/\D/g, '');
    const linkWhats = `https://wa.me/${telLimpo}`;

    // 2. Link do Google Maps com Rota
    const linkMaps = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(c.coleta)}&destination=${encodeURIComponent(c.entrega)}&travelmode=driving`;

    const msg = `📦 *NOVO PEDIDO DE ENTREGA*\n\n` +
                `👤 *Cliente:* ${c.nome}\n` +
                `📱 *WhatsApp:* ${c.telefone}\n\n` +
                `📍 *Coleta:* ${c.coleta}\n` +
                `🏁 *Entrega:* ${c.entrega}\n` +
                `📦 *Item:* ${c.pacote}\n` +
                (c.obs ? `📝 *Obs:* ${c.obs}\n` : '') +
                `\n📏 *Distância:* ${c.kmIda.toFixed(1)} km ${c.comRetorno ? '(c/ retorno)' : ''}\n` +
                `💰 *Valor:* R$ ${c.valor.toFixed(2).replace('.', ',')}`;

    // 3. Montagem do Teclado Inline
    const inlineKeyboard = {
      inline_keyboard: [
        [{ text: "📍 Ver rota no mapa", url: linkMaps }],
        [{ text: "💬 Chamar cliente no WhatsApp", url: linkWhats }]
      ]
    };

    try {
      await apiFetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: CONFIG.TG_CHAT_ID,
          text: msg,
          parse_mode: 'Markdown',
          reply_markup: inlineKeyboard
        })
      });

      DOM.sucessoMsg.textContent = 'Pedido enviado com sucesso! Aguarde nosso contato.';
      DOM.sucessoMsg.style.display = 'block';
      DOM.btnEnviar.style.display = 'none';
      DOM.btnCalcular.style.display = 'none';
    } catch (err) {
      DOM.erroMsg.textContent = 'Erro ao enviar para o sistema: ' + err.message;
      DOM.erroMsg.style.display = 'block';
      DOM.btnEnviar.disabled = false;
      DOM.btnEnviar.textContent = 'Confirmar e Enviar Pedido';
    }
  });
</script>

</body>
</html>
